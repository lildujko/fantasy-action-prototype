<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A random MMO RPG Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Start screen with class selection -->
    <div id="start-screen" class="screen">
      <h1>A random MMO RPG Game</h1>
      <p>Select a class to begin</p>
      <div class="class-buttons">
        <button onclick="startGame('demon')">Demon</button>
        <button onclick="startGame('mage')">Mage</button>
        <button onclick="startGame('beast')">Beast</button>
      </div>
    </div>

    <!-- Main UI overlay -->
    <div id="ui" class="hidden">
      <div id="bars">
        <div class="bar-container">
          <span>HP</span>
          <div class="bar">
            <div id="health-fill" class="fill"></div>
          </div>
        </div>
        <div class="bar-container">
          <span>XP</span>
          <div class="bar">
            <div id="xp-fill" class="fill"></div>
          </div>
        </div>
        <div id="level-display">Lvl&nbsp;<span id="level-value">1</span></div>
      </div>
      <div id="money-display">$0</div>
      <div id="instructions">
        <p>WASD: move | Shift: sprint | Left Click: attack | E: interact | I: inventory | C: cave</p>
      </div>
    </div>

    <!-- Inventory overlay -->
    <div id="inventory-overlay" class="overlay hidden">
      <h2>Inventory</h2>
      <ul id="inventory-list"></ul>
      <button id="close-inventory">Close</button>
    </div>

    <!-- Alert overlay for area discovery -->
    <div id="alert" class="hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
    <script src="game.js"></script>
  </body>
</html>
