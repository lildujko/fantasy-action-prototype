<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantasy Action Prototype</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="ui">
      <div id="health-container" class="bar-container">
        <span>Health</span>
        <div id="health-bar" class="bar">
          <div id="health-fill" class="bar-fill"></div>
        </div>
      </div>
      <div id="enemy-counter"></div>
      <div id="instructions">
        <p>W/A/S/D: move | Space: attack | Shift: sprint</p>
      </div>
    </div>

    <div id="start-screen">
      <h1>Choose Your Champion</h1>
      <p class="subtitle">Photorealistic lighting, weighted armor, and class-tuned combat roles.</p>
      <div class="class-container">
        <button onclick="selectClass('beast')" class="class-btn">
          <span class="title">🐺 Beast Vanguard</span>
          <span class="meta">Fast melee bruiser</span>
        </button>
        <button onclick="selectClass('mage')" class="class-btn">
          <span class="title">🔮 Arcane Archmage</span>
          <span class="meta">High damage, glass cannon</span>
        </button>
        <button onclick="selectClass('demon')" class="class-btn">
          <span class="title">😈 Demon Warlord</span>
          <span class="meta">Tanky fighter, heavy sustain</span>
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
    <script src="game.js"></script>
  </body>
</html>
