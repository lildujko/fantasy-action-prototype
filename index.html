<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A random MMO RPG Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="start-screen">
    <div class="panel">
      <h1>A random MMO RPG Game</h1>
      <p>Choose your class</p>
      <div class="class-grid">
        <button onclick="startGame('demon')">Demon</button>
        <button onclick="startGame('mage')">Mage</button>
        <button onclick="startGame('beast')">Beast</button>
      </div>
      <div class="help">WASD move · Shift sprint · Space attack · E interact</div>
    </div>
  </div>

  <div id="hud">
    <div id="money">$0</div>
    <div id="weapon">Weapon: None</div>
    <div id="ore">Iron: 0</div>
    <div id="health"><div id="health-fill"></div></div>
    <div id="quest">Talk to the quest giver.</div>
    <div id="message">Welcome.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
