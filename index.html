<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A random MMO RPG Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="start-screen">
    <div class="start-panel">
      <h1>A random MMO RPG Game</h1>
      <p class="subtitle">Choose your class</p>
      <div class="class-grid">
        <button class="class-btn demon" onclick="startGame('demon')">Demon</button>
        <button class="class-btn mage" onclick="startGame('mage')">Mage</button>
        <button class="class-btn beast" onclick="startGame('beast')">Beast</button>
      </div>
      <p class="tip">WASD move · Shift sprint · Left click attack · Mouse camera · E interact</p>
    </div>
  </div>

  <div id="hud">
    <div class="hud-row">
      <div id="money">$0</div>
      <div id="weapon">Weapon: Sword</div>
      <div id="ore">Iron: 0</div>
    </div>
    <div class="hud-row">
      <div id="health-wrap"><div id="health-fill"></div></div>
    </div>
    <div class="hud-row">
      <div id="quest-text">Talk to the quest giver for a pickaxe.</div>
    </div>
    <div class="hud-row">
      <div id="message-box">Welcome to town.</div>
    </div>
  </div>

  <div id="hotbar">
    <div class="hotbar-slot active" id="slot-1"><span class="slot-num">1</span><span class="slot-label">Sword</span></div>
    <div class="hotbar-slot" id="slot-2"><span class="slot-num">2</span><span class="slot-label">Pickaxe</span></div>
    <div class="hotbar-slot" id="slot-3"><span class="slot-num">3</span><span class="slot-label">Katana</span></div>
    <div class="hotbar-slot" id="slot-4"><span class="slot-num">4</span><span class="slot-label">Empty</span></div>
    <div class="hotbar-slot" id="slot-5"><span class="slot-num">5</span><span class="slot-label">Empty</span></div>
  </div>

  <div id="interaction-panel" class="hidden">
    <div class="panel-card">
      <h2 id="panel-title">Door</h2>
      <p id="panel-text">Choose what you want.</p>
      <div id="panel-buttons"></div>
      <button class="close-btn" onclick="closePanel()">Close</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
